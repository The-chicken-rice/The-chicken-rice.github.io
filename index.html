<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文明 - 泉水自动归属</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a170f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #d4c5a0;
            touch-action: none;
            user-select: none;
        }
        .container {
            background: #2a2418;
            padding: 16px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            max-width: 820px;
            width: 100%;
            margin: 10px;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #c4a86a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
            cursor: crosshair;
        }
        .info-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 12px 4px 8px;
            gap: 6px;
        }
        .info-panel span {
            background: #1f1a10;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #b8a882;
            border: 1px solid #3a3220;
        }
        .info-panel .highlight { color: #f5c842; }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 4px;
            justify-content: center;
        }
        .toolbar button {
            background: #1f1a10;
            border: 1px solid #3a3220;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #d4c5a0;
            box-shadow: 0 3px 0 #0f0c08;
            transition: 0.07s ease;
            touch-action: manipulation;
            cursor: pointer;
            flex: 0 1 auto;
            white-space: nowrap;
        }
        .toolbar button:active { transform: translateY(3px); box-shadow: 0 1px 0 #0f0c08; }
        .toolbar .danger { color: #e86a5f; border-left: 2px solid #e86a5f; }
        .toolbar .create { color: #7aba7a; border-left: 2px solid #7aba7a; }
        .toolbar .special { color: #f5c842; border-left: 2px solid #f5c842; }
        .status-line {
            font-size: 13px;
            color: #8a7a5a;
            text-align: center;
            margin-top: 6px;
            padding: 4px;
            background: #1a150e;
            border-radius: 40px;
        }
        .rank-panel {
            margin-top: 10px;
            background: #1a150e;
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .rank-panel .title { font-weight: 700; color: #f5c842; font-size: 15px; width: 100%; margin-bottom: 4px; }
        .rank-list { display: flex; flex-wrap: wrap; gap: 6px 16px; flex: 1; }
        .rank-item { font-size: 13px; color: #b8a882; background: #2a2418; padding: 2px 12px; border-radius: 30px; border: 1px solid #3a3220; }
        .rank-item .pos { color: #7a6a50; margin-right: 4px; }
        .rank-item .days { color: #f5c842; font-weight: 700; }
        .rank-actions { display: flex; gap: 6px; align-items: center; }
        .rank-actions button { background: #1f1a10; border: 1px solid #3a3220; border-radius: 30px; padding: 3px 14px; font-size: 12px; color: #b8a882; cursor: pointer; touch-action: manipulation; }
        .rank-actions .clear-btn { color: #e86a5f; }
        .empty-rank { color: #5a4a38; font-size: 13px; }
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .toolbar button { font-size: 11px; padding: 5px 10px; }
            .info-panel span { font-size: 12px; padding: 3px 10px; }
            .rank-item { font-size: 12px; padding: 2px 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="game-wrapper">
        <canvas id="worldCanvas" width="900" height="900"></canvas>
    </div>
    <div class="info-panel">
        <span>📆 天数 <span id="dayDisplay" class="highlight">0</span></span>
        <span>👥 <span id="humanCount">0</span></span>
        <span>🏡 <span id="villageCount">0</span></span>
        <span>🌳 <span id="treeCount">0</span></span>
        <span>🐾 <span id="animalCount">0</span></span>
        <span>⚔️ <span id="factionCount">0</span> 阵营</span>
        <span>⛲ <span id="springCount">0/8</span> 泉水</span>
    </div>
    <div class="toolbar">
        <button class="create" data-tool="human">👤 人</button>
        <button class="create" data-tool="village">🏡 村庄</button>
        <button class="create" data-tool="tree">🌳 树</button>
        <button class="create" data-tool="animal">🐾 动物</button>
        <button class="danger" data-tool="meteor">☄️ 陨石</button>
        <button class="danger" data-tool="nuke">💥 核弹</button>
        <button class="special" data-tool="asteroid">🌠 流星雨</button>
        <button class="special" data-tool="reset">🔄 重置</button>
    </div>
    <div class="status-line" id="statusMessage">⛲ 领土扩张会主动占据中立泉水</div>
    <div class="rank-panel">
        <div class="title">🏆 灭世时长榜</div>
        <div class="rank-list" id="rankList"><span class="empty-rank">暂无记录</span></div>
        <div class="rank-actions"><button class="clear-btn" id="clearRankBtn">清除</button></div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 900;
        const SPRING_RADIUS = 80;
        const SPRING_COUNT = 8;
        const EXPAND_SPEED = 0.3;
        const GRID_COLOR = 'rgba(60, 50, 30, 0.12)';

        let springs = [];

        function generateSprings() {
            springs = [];
            for (let i = 0; i < SPRING_COUNT; i++) {
                let attempts = 0, x, y, valid;
                do {
                    x = 40 + Math.random() * (W - 80);
                    y = 40 + Math.random() * (H - 80);
                    valid = true;
                    for (let s of springs) {
                        const dx = s.x - x, dy = s.y - y;
                        if (Math.sqrt(dx*dx + dy*dy) < 90) { valid = false; break; }
                    }
                    attempts++;
                } while (!valid && attempts < 150);
                springs.push({ x, y, radius: 14, ownerId: null });
            }
        }

        function isNearSpring(x, y) {
            for (let s of springs) {
                const dx = s.x - x, dy = s.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < SPRING_RADIUS) return true;
            }
            return false;
        }

        function canClaimSpring(x, y, factionId) {
            for (let s of springs) {
                const dx = s.x - x, dy = s.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < SPRING_RADIUS) {
                    if (s.ownerId !== null && s.ownerId !== factionId) return false;
                }
            }
            return true;
        }

        function claimSpring(x, y, factionId) {
            for (let s of springs) {
                const dx = s.x - x, dy = s.y - y;
                if (Math.sqrt(dx*dx + dy*dy) < SPRING_RADIUS && s.ownerId === null) {
                    s.ownerId = factionId;
                }
            }
        }

        function getNearestSpring(x, y) {
            let nearest = null, minDist = Infinity;
            for (let s of springs) {
                const dx = s.x - x, dy = s.y - y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist) { minDist = dist; nearest = s; }
            }
            return nearest;
        }

        function autoClaimSpringsByTerritory(faction) {
            const radius = faction.radius;
            const cx = faction.cx, cy = faction.cy;
            for (let s of springs) {
                if (s.ownerId !== null) continue;
                const dx = s.x - cx, dy = s.y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist <= radius) {
                    s.ownerId = faction.id;
                    setStatus(`⛲ 领土扩张，占据了一处中立泉水！`);
                }
            }
        }

        const FACTION_COLORS = ['#c0392b', '#2980b9', '#27ae60', '#f39c12', '#8e44ad', '#16a085', '#d35400', '#e74c8b', '#2c3e50', '#7f8c8d'];
        let factionIdCounter = 0;

        let day = 0, dayTimer = 0;
        const DAY_INTERVAL = 60;
        let entities = [], disasters = [], particles = [];
        let factions = [];
        let selectedTool = 'human';
        let civilizationStarted = false;
        let deathStreak = 0;
        const DEATH_THRESHOLD = 5;
        let isApocalypse = false;

        const STORAGE_KEY = 'god_sandbox_rank';
        function loadRank() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; } }
        function saveRank(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }
        function addRank(days) { if (days <= 0) return; let r = loadRank(); r.push(days); r.sort((a,b)=>b-a); if (r.length>10) r=r.slice(0,10); saveRank(r); renderRank(); }
        function clearRank() { saveRank([]); renderRank(); }
        function renderRank() {
            const list = document.getElementById('rankList');
            const rank = loadRank();
            if (rank.length === 0) { list.innerHTML = '<span class="empty-rank">暂无记录</span>'; return; }
            list.innerHTML = rank.map((d, i) => `<span class="rank-item"><span class="pos">#${i+1}</span><span class="days">${d}</span> 天</span>`).join('');
        }
        document.getElementById('clearRankBtn').addEventListener('click', clearRank);

        function countType(type) { return entities.filter(e => e.type === type && e.alive).length; }
        function updateUI() {
            document.getElementById('dayDisplay').textContent = day;
            document.getElementById('humanCount').textContent = countType('human');
            document.getElementById('villageCount').textContent = countType('village');
            document.getElementById('treeCount').textContent = countType('tree');
            document.getElementById('animalCount').textContent = countType('animal');
            document.getElementById('factionCount').textContent = factions.length;
            const claimed = springs.filter(s => s.ownerId !== null).length;
            document.getElementById('springCount').textContent = `${claimed}/${SPRING_COUNT}`;
        }
        function setStatus(msg) { document.getElementById('statusMessage').textContent = msg; }

        function createFaction(x, y) {
            const color = FACTION_COLORS[factionIdCounter % FACTION_COLORS.length];
            factionIdCounter++;
            const faction = { id: factionIdCounter, color: color, cx: x, cy: y, radius: 30, humans: [] };
            factions.push(faction);
            return faction;
        }

        function getFactionById(id) { return factions.find(f => f.id === id); }

        function expandFactionTerritory(faction) {
            const humans = entities.filter(e => e.type === 'human' && e.alive && e.factionId === faction.id);
            if (humans.length === 0) return;
            let maxDist = 0;
            humans.forEach(h => {
                const dx = h.x - faction.cx, dy = h.y - faction.cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > maxDist) maxDist = dist;
            });
            if (maxDist <= faction.radius) return;
            let newRadius = faction.radius + EXPAND_SPEED;
            let collides = false;
            for (let other of factions) {
                if (other.id === faction.id) continue;
                const dx = faction.cx - other.cx, dy = faction.cy - other.cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (newRadius + other.radius > dist) { collides = true; break; }
            }
            if (!collides) {
                faction.radius = newRadius;
                // 扩张后检查是否覆盖中立泉水
                autoClaimSpringsByTerritory(faction);
            }
        }

        function spawnEntity(type, x, y, factionId = null) {
            if (type === 'human' || type === 'village') civilizationStarted = true;

            if (type === 'village') {
                if (!isNearSpring(x, y)) {
                    setStatus('❌ 村庄必须靠近泉水！');
                    return;
                }
                let targetFactionId = factionId;
                if (targetFactionId === null) {
                    const nearest = getNearestSpring(x, y);
                    if (nearest && nearest.ownerId !== null) {
                        targetFactionId = nearest.ownerId;
                    }
                }
                if (targetFactionId === null) {
                    let hasNeutral = false;
                    for (let s of springs) {
                        const dx = s.x - x, dy = s.y - y;
                        if (Math.sqrt(dx*dx + dy*dy) < SPRING_RADIUS && s.ownerId === null) {
                            hasNeutral = true; break;
                        }
                    }
                    if (!hasNeutral) {
                        setStatus('❌ 该区域没有可用的中立泉水！');
                        return;
                    }
                    const faction = createFaction(x, y);
                    targetFactionId = faction.id;
                    claimSpring(x, y, targetFactionId);
                    const village = { x, y, type: 'village', age: 0, alive: true, hp: 200, radius: 20, factionId: targetFactionId };
                    entities.push(village);
                    faction.humans.push(village);
                    setStatus(`🏡 新阵营诞生！占领了泉水！`);
                    updateUI();
                    return;
                }
                if (!canClaimSpring(x, y, targetFactionId)) {
                    setStatus('❌ 该泉水已被其他阵营占领！');
                    return;
                }
                const faction = getFactionById(targetFactionId);
                if (!faction) { setStatus('❌ 阵营不存在'); return; }
                claimSpring(x, y, targetFactionId);
                const village = { x, y, type: 'village', age: 0, alive: true, hp: 200, radius: 20, factionId: targetFactionId };
                entities.push(village);
                faction.humans.push(village);
                setStatus(`🏡 村庄建立！`);
                updateUI();
                return;
            }

            if (type === 'human') {
                let targetFaction = null;
                if (factionId !== null) {
                    targetFaction = getFactionById(factionId);
                } else {
                    for (let f of factions) {
                        const dx = x - f.cx, dy = y - f.cy;
                        if (Math.sqrt(dx*dx + dy*dy) < f.radius) {
                            targetFaction = f;
                            break;
                        }
                    }
                }
                if (targetFaction) {
                    const human = { x, y, type: 'human', age: 0, alive: true, hp: 100, vx: 0, vy: 0, moveTimer: 0, factionId: targetFaction.id };
                    entities.push(human);
                    targetFaction.humans.push(human);
                } else {
                    const human = { x, y, type: 'human', age: 0, alive: true, hp: 100, vx: 0, vy: 0, moveTimer: 0, factionId: null };
                    entities.push(human);
                }
                updateUI();
                return;
            }

            switch(type) {
                case 'tree': entities.push({ x, y, type: 'tree', age: 0, alive: true, hp: 60, radius: 14 }); break;
                case 'animal': entities.push({ x, y, type: 'animal', age: 0, alive: true, hp: 70, vx: 0, vy: 0, moveTimer: 0 }); break;
                default: break;
            }
            updateUI();
        }

        function autoFormVillages() {
            const humans = entities.filter(e => e.type === 'human' && e.alive && e.factionId === null);
            if (humans.length < 3) return;

            const GRID_SIZE = 80;
            const grid = {};
            humans.forEach(h => {
                const gx = Math.floor(h.x / GRID_SIZE);
                const gy = Math.floor(h.y / GRID_SIZE);
                const key = gx + ',' + gy;
                if (!grid[key]) grid[key] = [];
                grid[key].push(h);
            });

            for (let key in grid) {
                const [gx, gy] = key.split(',').map(Number);
                const humanList = grid[key];
                if (humanList.length >= 3) {
                    const cx = gx * GRID_SIZE + GRID_SIZE/2;
                    const cy = gy * GRID_SIZE + GRID_SIZE/2;
                    if (!isNearSpring(cx, cy)) continue;

                    let hasNeutralSpring = false;
                    for (let s of springs) {
                        const dx = s.x - cx, dy = s.y - cy;
                        if (Math.sqrt(dx*dx + dy*dy) < SPRING_RADIUS && s.ownerId === null) {
                            hasNeutralSpring = true; break;
                        }
                    }
                    if (!hasNeutralSpring) continue;

                    const hasVillage = entities.some(e => {
                        if (e.type !== 'village' || !e.alive) return false;
                        const dx = e.x - cx, dy = e.y - cy;
                        return Math.sqrt(dx*dx + dy*dy) < GRID_SIZE;
                    });
                    if (!hasVillage) {
                        const nearest = getNearestSpring(cx, cy);
                        if (nearest && nearest.ownerId === null) {
                            const faction = createFaction(cx, cy);
                            claimSpring(cx, cy, faction.id);
                            const village = { x: cx, y: cy, type: 'village', age: 0, alive: true, hp: 200, radius: 20, factionId: faction.id };
                            entities.push(village);
                            faction.humans.push(village);
                            humanList.forEach(h => {
                                h.factionId = faction.id;
                                faction.humans.push(h);
                            });
                            setStatus(`🏡 人群聚集，占领泉水形成新阵营！`);
                        }
                    }
                }
            }
        }

        function spawnDisaster(type, cx, cy) {
            const radius = type === 'nuke' ? 90 : (type === 'asteroid' ? 50 : 40);
            const damage = type === 'nuke' ? 180 : (type === 'asteroid' ? 70 : 50);
            const effectRadius = type === 'nuke' ? 140 : (type === 'asteroid' ? 110 : 90);
            for (let i = 0; i < (type === 'nuke' ? 100 : 50); i++) {
                const angle = Math.random() * 2 * Math.PI;
                const speed = 1 + Math.random() * (type === 'nuke' ? 7 : 4);
                particles.push({ x: cx, y: cy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 30+Math.random()*30, maxLife: 60, color: type==='nuke'?'#e86a5f':'#f5c842' });
            }
            entities.forEach(e => {
                const dx = e.x - cx, dy = e.y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < effectRadius) {
                    const factor = 1 - dist / effectRadius;
                    e.hp -= damage * factor * 0.8 + 10;
                    if (e.hp <= 0) e.alive = false;
                }
            });
            entities = entities.filter(e => e.alive);
            factions.forEach(f => { f.humans = f.humans.filter(h => entities.includes(h)); });
            factions = factions.filter(f => f.humans.length > 0);
            disasters.push({ x: cx, y: cy, radius: effectRadius, life: 90, type: 'crater' });
            updateUI();
            setStatus(`💥 ${type} 爆炸！半径 ${Math.round(effectRadius)}`);
        }

        function resetWorld() {
            entities = []; disasters = []; particles = [];
            factions = []; factionIdCounter = 0;
            generateSprings();
            day = 0; dayTimer = 0;
            civilizationStarted = false; deathStreak = 0; isApocalypse = false;
            updateUI(); setStatus('🔄 世界已重置');
        }

        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tool = e.currentTarget.dataset.tool;
                if (tool === 'reset') { resetWorld(); return; }
                selectedTool = tool;
                setStatus(`🔧 当前工具: ${tool}`);
            });
        });

        canvas.addEventListener('click', (e) => {
            if (isApocalypse) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width, scaleY = H / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            if (x < 0 || x > W || y < 0 || y > H) return;

            if (selectedTool === 'human') spawnEntity('human', x, y);
            else if (selectedTool === 'village') spawnEntity('village', x, y);
            else if (selectedTool === 'tree') spawnEntity('tree', x, y);
            else if (selectedTool === 'animal') spawnEntity('animal', x, y);
            else if (selectedTool === 'meteor') spawnDisaster('meteor', x, y);
            else if (selectedTool === 'nuke') spawnDisaster('nuke', x, y);
            else if (selectedTool === 'asteroid') {
                for (let i = 0; i < 5 + Math.floor(Math.random() * 4); i++) {
                    const ox = x + (Math.random() - 0.5) * 200;
                    const oy = y + (Math.random() - 0.5) * 200;
                    setTimeout(() => { spawnDisaster('asteroid', Math.max(15, Math.min(W-15, ox)), Math.max(15, Math.min(H-15, oy))); }, i*180);
                }
                setStatus('🌠 流星雨来袭！');
            }
        });

        function update() {
            if (isApocalypse) return;

            dayTimer += 1/60;
            if (dayTimer >= DAY_INTERVAL) {
                dayTimer = 0; day++;
                if (civilizationStarted) {
                    factions.forEach(f => {
                        const fHumans = entities.filter(e => e.type === 'human' && e.alive && e.factionId === f.id);
                        if (fHumans.length > 0 && Math.random() < 0.12) {
                            const h = fHumans[Math.floor(Math.random() * fHumans.length)];
                            spawnEntity('human', h.x + (Math.random()-0.5)*50, h.y + (Math.random()-0.5)*50, f.id);
                        }
                        const villages = entities.filter(e => e.type === 'village' && e.alive && e.factionId === f.id);
                        villages.forEach(v => {
                            if (Math.random() < 0.08) {
                                spawnEntity('human', v.x + (Math.random()-0.5)*60, v.y + (Math.random()-0.5)*60, f.id);
                            }
                        });
                    });
                    const animals = entities.filter(e => e.type === 'animal' && e.alive);
                    if (animals.length > 1 && Math.random() < 0.10) {
                        const a = animals[Math.floor(Math.random() * animals.length)];
                        spawnEntity('animal', a.x + (Math.random()-0.5)*40, a.y + (Math.random()-0.5)*40);
                    }
                    const trees = entities.filter(e => e.type === 'tree' && e.alive);
                    if (trees.length > 0 && Math.random() < 0.06) {
                        const t = trees[Math.floor(Math.random() * trees.length)];
                        spawnEntity('tree', t.x + (Math.random()-0.5)*60, t.y + (Math.random()-0.5)*60);
                    }
                }
                if (civilizationStarted && day > 5) {
                    if (Math.random() < 0.05) {
                        const rx = 40 + Math.random() * (W - 80);
                        const ry = 40 + Math.random() * (H - 80);
                        spawnDisaster('meteor', rx, ry);
                    }
                    if (day > 15 && Math.random() < 0.025) {
                        const rx = 40 + Math.random() * (W - 80);
                        const ry = 40 + Math.random() * (H - 80);
                        spawnDisaster('asteroid', rx, ry);
                    }
                }
                updateUI();
                setStatus(`📆 第 ${day} 天`);
            }

            if (Math.floor(dayTimer * 60) % 4 === 0) {
                autoFormVillages();
            }

            factions.forEach(f => expandFactionTerritory(f));

            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--; return p.life > 0; });
            disasters = disasters.filter(d => { d.life--; return d.life > 0; });

            entities.forEach(e => {
                if (!e.alive) return;
                e.age++;
                if (e.type === 'human') {
                    e.moveTimer = (e.moveTimer || 0) + 1;
                    if (e.moveTimer > 40 + Math.random() * 60) {
                        e.moveTimer = 0;
                        e.vx = (Math.random() - 0.5) * 1.0;
                        e.vy = (Math.random() - 0.5) * 1.0;
                    }
                    e.x += (e.vx || 0); e.y += (e.vy || 0);
                    e.x = Math.max(5, Math.min(W-5, e.x));
                    e.y = Math.max(5, Math.min(H-5, e.y));
                }
                if (e.type === 'animal') {
                    e.moveTimer = (e.moveTimer || 0) + 1;
                    if (e.moveTimer > 20 + Math.random() * 40) {
                        e.moveTimer = 0;
                        e.vx = (Math.random() - 0.5) * 1.6;
                        e.vy = (Math.random() - 0.5) * 1.6;
                    }
                    e.x += (e.vx || 0); e.y += (e.vy || 0);
                    e.x = Math.max(5, Math.min(W-5, e.x));
                    e.y = Math.max(5, Math.min(H-5, e.y));
                }
            });

            entities = entities.filter(e => e.alive);
            factions.forEach(f => { f.humans = f.humans.filter(h => entities.includes(h) && h.alive); });
            factions = factions.filter(f => f.humans.length > 0);

            if (civilizationStarted && !isApocalypse) {
                const hc = countType('human'), vc = countType('village');
                if ((hc <= 1 && vc === 0) || (hc === 0 && vc <= 1)) deathStreak += 1/60;
                else { if (hc >= 2 || vc >= 2) deathStreak = Math.max(0, deathStreak - 0.3); }
                if (deathStreak >= DEATH_THRESHOLD) {
                    isApocalypse = true;
                    addRank(day);
                    setStatus(`💀 灭世！世界在 ${day} 天毁灭`);
                }
            } else { deathStreak = 0; }
            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#c4a86a';
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = GRID_COLOR;
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
            }

            springs.forEach(s => {
                let color = '#6a9ec4';
                let glowColor = 'rgba(100, 160, 200, 0.25)';
                if (s.ownerId !== null) {
                    const f = getFactionById(s.ownerId);
                    if (f) {
                        color = f.color;
                        glowColor = color + '30';
                    }
                }

                const gradient = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 70);
                gradient.addColorStop(0, glowColor);
                gradient.addColorStop(0.6, glowColor.replace('30', '15'));
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(s.x, s.y, 70, 0, 2*Math.PI);
                ctx.fill();

                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, 2*Math.PI);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(s.x - 4, s.y - 5, 5, 0, 2*Math.PI);
                ctx.fill();

                if (s.ownerId !== null) {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚑', s.x, s.y - 26);
                }
            });

            factions.forEach(f => {
                const gradient = ctx.createRadialGradient(f.cx, f.cy, 0, f.cx, f.cy, f.radius);
                const color = f.color;
                gradient.addColorStop(0, color + '35');
                gradient.addColorStop(0.5, color + '20');
                gradient.addColorStop(1, color + '05');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(f.cx, f.cy, f.radius, 0, 2*Math.PI);
                ctx.fill();

                ctx.strokeStyle = color + '50';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([8, 10]);
                ctx.beginPath();
                ctx.arc(f.cx, f.cy, f.radius, 0, 2*Math.PI);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = color;
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('⚑', f.cx, f.cy - f.radius - 8);
            });

            disasters.forEach(d => {
                if (d.type === 'crater') {
                    const alpha = d.life / 90 * 0.5;
                    ctx.beginPath(); ctx.arc(d.x, d.y, d.radius, 0, 2*Math.PI);
                    ctx.fillStyle = `rgba(50, 40, 25, ${alpha})`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(80, 65, 45, ${alpha*0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });

            entities.forEach(e => {
                if (!e.alive) return;
                const x = e.x, y = e.y;

                if (e.type === 'human') {
                    let color = '#7a9ab5';
                    if (e.factionId !== null) {
                        const f = getFactionById(e.factionId);
                        if (f) color = f.color;
                    }
                    ctx.beginPath(); ctx.arc(x, y, 8, 0, 2*Math.PI);
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 14;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#e8ddd0';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('👤', x-6, y+5);
                } else if (e.type === 'village') {
                    const f = getFactionById(e.factionId);
                    const color = f ? f.color : '#a07050';
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 24;
                    ctx.beginPath(); ctx.arc(x, y, 20, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#f0e8d8';
                    ctx.font = '20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🏡', x-12, y+7);
                } else if (e.type === 'tree') {
                    ctx.fillStyle = '#5a8a5a';
                    ctx.shadowColor = '#5a8a5a';
                    ctx.shadowBlur = 12;
                    ctx.beginPath(); ctx.arc(x, y, 12, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#2a2a1a';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🌳', x-8, y+5);
                } else if (e.type === 'animal') {
                    ctx.fillStyle = '#c49a6a';
                    ctx.shadowColor = '#c49a6a';
                    ctx.shadowBlur = 10;
                    ctx.beginPath(); ctx.arc(x, y, 10, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#e8ddd0';
                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🐾', x-7, y+6);
                }
            });

            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4 * alpha + 1, 0, 2*Math.PI);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            if (isApocalypse) {
                ctx.fillStyle = 'rgba(20,15,10,0.65)';
                ctx.fillRect(0,0,W,H);
                ctx.fillStyle = '#e86a5f';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💀 灭世', W/2, H/2 - 40);
                ctx.fillStyle = '#d4c5a0';
                ctx.font = '26px sans-serif';
                ctx.fillText(`第 ${day} 天`, W/2, H/2 + 50);
                ctx.fillStyle = '#7a6a50';
                ctx.font = '18px sans-serif';
                ctx.fillText('点击「重置」重新开始', W/2, H/2 + 110);
            }
            updateUI();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        generateSprings();
        renderRank();
        setStatus('⛲ 8个泉水，领土扩张会主动占据中立泉水');
        loop();
    })();
</script>
</body>
</html>
