<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .container {
            background: #16213e;
            padding: 16px 16px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
            width: 100%;
            max-width: 420px;
            margin: 10px;
        }
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 400px;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            background: #0f0f23;
            border-radius: 16px;
            box-shadow: inset 0 0 30px rgba(0,255,200,0.08);
            touch-action: none;
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 4px 8px;
            color: #a0e8d8;
            font-size: 16px;
            font-weight: 500;
        }
        .score span {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        button {
            background: #f5c842;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38f2e;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b38f2e;
        }
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 4px;
            justify-content: center;
            margin: 12px auto 0;
        }
        .dpad button {
            background: #2a3a5e;
            border: none;
            border-radius: 14px;
            color: #a0e8d8;
            font-size: 28px;
            box-shadow: 0 4px 0 #0f1a2e;
            padding: 0;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            cursor: pointer;
        }
        .dpad button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1a2e;
        }
        .dpad .empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        .dpad .empty:active {
            transform: none;
            box-shadow: none;
        }
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        .start-overlay h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #f5c842;
        }
        .start-overlay p {
            font-size: 16px;
            color: #a0e8d8;
            opacity: 0.8;
        }
        .hint {
            margin-top: 8px;
            color: #5f7a8a;
            font-size: 12px;
        }
        @media (max-width: 480px) {
            .container { padding: 10px 10px 16px; margin: 4px; }
            .dpad { grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px 52px; gap: 3px; }
            .dpad button { font-size: 24px; border-radius: 12px; }
            .info { font-size: 14px; }
            .score span { font-size: 20px; }
            .start-overlay h1 { font-size: 26px; }
        }
        @media (max-width: 380px) {
            .dpad { grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; gap: 3px; }
            .dpad button { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="start-overlay" id="startOverlay">
            <h1>🐍 贪吃蛇</h1>
            <p>点击开始</p>
        </div>
    </div>
    <div class="info">
        <div class="score">🍎 <span id="scoreDisplay">0</span></div>
        <button id="restartBtn">🔄 重来</button>
    </div>
    <div class="dpad">
        <div class="empty"></div>
        <button id="btnUp">▲</button>
        <div class="empty"></div>
        <button id="btnLeft">◀</button>
        <button id="btnDown">▼</button>
        <button id="btnRight">▶</button>
    </div>
    <div class="hint">键盘方向键 / 点击方向按钮</div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const startOverlay = document.getElementById('startOverlay');

        const GRID_SIZE = 20;
        const CELL_SIZE = 400 / GRID_SIZE;

        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameOver = false;
        let winFlag = false;
        let paused = false;
        let started = false;
        let gameLoopInterval = null;

        function initGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameOver = false;
            winFlag = false;
            paused = false;
            started = false;
            startOverlay.style.display = 'flex';
            updateScore();
            spawnFood();
            draw();
            clearGameLoop();
        }

        function startGame() {
            started = true;
            startOverlay.style.display = 'none';
            clearGameLoop();
            gameLoopInterval = setInterval(gameTick, 120);
        }

        function spawnFood() {
            const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
            const freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!snakeSet.has(`${i},${j}`)) freeCells.push({x: i, y: j});
                }
            }
            if (freeCells.length === 0) {
                winFlag = true;
                gameOver = true;
                clearGameLoop();
                return;
            }
            const rand = Math.floor(Math.random() * freeCells.length);
            food = freeCells[rand];
        }

        function updateScore() {
            scoreSpan.textContent = score;
        }

        function changeDirection(newDir) {
            const opposites = { 'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left' };
            if (newDir !== opposites[direction]) {
                nextDirection = newDir;
            }
        }

        function moveSnake() {
            if (gameOver || paused || !started) return;

            direction = nextDirection;
            const head = snake[0];
            let newHead = { ...head };
            switch (direction) {
                case 'right': newHead.x += 1; break;
                case 'left':  newHead.x -= 1; break;
                case 'down':  newHead.y += 1; break;
                case 'up':    newHead.y -= 1; break;
                default: return;
            }

            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver = true;
                clearGameLoop();
                return;
            }

            const isEating = (newHead.x === food.x && newHead.y === food.y);

            let newSnake = [newHead, ...snake];
            if (!isEating) {
                newSnake.pop();
            }

            const headStr = `${newHead.x},${newHead.y}`;
            const bodyWithoutHead = newSnake.slice(1).map(cell => `${cell.x},${cell.y}`);
            if (bodyWithoutHead.includes(headStr)) {
                gameOver = true;
                clearGameLoop();
                return;
            }

            snake = newSnake;

            if (isEating) {
                score++;
                updateScore();
                spawnFood();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);

            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, 400);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(400, i * CELL_SIZE);
                ctx.stroke();
            }

            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.30)';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 4, food.y * CELL_SIZE + CELL_SIZE/2 - 5, 4, 0, 2 * Math.PI);
            ctx.fill();

            ctx.shadowBlur = 0;
            snake.forEach((cell, index) => {
                const x = cell.x * CELL_SIZE;
                const y = cell.y * CELL_SIZE;
                const radius = 6;
                const ratio = index / snake.length;
                const r = Math.round(20 + 60 * (1 - ratio));
                const g = Math.round(200 + 40 * (1 - ratio));
                const b = Math.round(180 + 20 * (1 - ratio));
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowColor = 'rgba(0,255,200,0.25)';
                ctx.shadowBlur = index === 0 ? 20 : 8;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            const head = snake[0];
            if (head) {
                const hx = head.x * CELL_SIZE + CELL_SIZE/2;
                const hy = head.y * CELL_SIZE + CELL_SIZE/2;
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(hx - 6, hy - 6, 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(hx + 6, hy - 6, 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(hx - 7, hy - 8, 2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(hx + 5, hy - 8, 2, 0, 2 * Math.PI);
                ctx.fill();
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.60)';
                ctx.fillRect(0, 0, 400, 400);
                ctx.fillStyle = winFlag ? '#f5c842' : '#ff6b6b';
                ctx.font = 'bold 36px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(winFlag ? '🎉 通关！' : '💀 游戏结束', 200, 180);
                ctx.fillStyle = '#c0d0d0';
                ctx.font = '18px "Segoe UI", sans-serif';
                ctx.fillText('点击「重来」继续', 200, 250);
            } else if (paused && started) {
                ctx.fillStyle = 'rgba(0,0,0,0.40)';
                ctx.fillRect(0, 0, 400, 400);
                ctx.fillStyle = '#a0e8d8';
                ctx.font = 'bold 32px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ 暂停中', 200, 200);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };
        }

        function gameTick() {
            if (!gameOver && !paused && started) {
                moveSnake();
            }
            draw();
        }

        function clearGameLoop() {
            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
        }

        // ===== 方向键控制 =====
        document.getElementById('btnUp').addEventListener('click', () => { if (started && !gameOver) changeDirection('up'); });
        document.getElementById('btnDown').addEventListener('click', () => { if (started && !gameOver) changeDirection('down'); });
        document.getElementById('btnLeft').addEventListener('click', () => { if (started && !gameOver) changeDirection('left'); });
        document.getElementById('btnRight').addEventListener('click', () => { if (started && !gameOver) changeDirection('right'); });

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
                if (!started || gameOver) return;
                const map = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right'
                };
                changeDirection(map[key]);
            }
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                if (!started || gameOver) return;
                paused = !paused;
                draw();
            }
        });

        startOverlay.addEventListener('click', startGame);
        startOverlay.addEventListener('touchstart', function(e) {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.getElementById('restartBtn').addEventListener('click', () => {
            clearGameLoop();
            initGame();
        });

        initGame();
    })();
</script>
</body>
</html>
